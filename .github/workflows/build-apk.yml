name: Build debug APK

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch: {}

permissions:
  contents: write # needed to attach the APK to a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlarmClock-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Only runs when this build was triggered by publishing a GitHub Release
      # (Releases tab -> Draft a new release -> pick/create a tag -> Publish).
      # Attaches a version-named APK directly to that release as a downloadable asset.
      - name: Rename APK for release
        if: github.event_name == 'release'
        run: cp app/build/outputs/apk/debug/app-debug.apk AlarmClock-${{ github.event.release.tag_name }}.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: AlarmClock-${{ github.event.release.tag_name }}.apk
