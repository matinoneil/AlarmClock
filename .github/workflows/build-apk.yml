name: Build debug APK

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch: {}

permissions:
  contents: write # needed to attach the APK to a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # When this build was triggered by publishing a GitHub Release, derive the
      # app's version name from the release tag (e.g. tag "v1.5" or "V1.5" ->
      # versionName "1.5"), and use the Actions run number as the version code, which always
      # increases regardless of tag naming. Plain pushes/manual runs keep the
      # defaults baked into build.gradle.kts.
      - name: Determine version override
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION_NAME="${TAG#[vV]}"
            echo "gradle_args=-PversionNameOverride=$VERSION_NAME -PversionCodeOverride=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug APK
        run: gradle assembleDebug ${{ steps.version.outputs.gradle_args }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlarmClock-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Only runs when this build was triggered by publishing a GitHub Release.
      # Attaches a version-named APK directly to that release as a downloadable asset.
      - name: Rename APK for release
        if: github.event_name == 'release'
        run: cp app/build/outputs/apk/debug/app-debug.apk AlarmClock-${{ github.event.release.tag_name }}.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: AlarmClock-${{ github.event.release.tag_name }}.apk
